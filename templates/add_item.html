<!DOCTYPE html>
<html>
<head>
    <title>Add Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 550px;">
    <div class="card p-4 shadow border-0 rounded-3" style="background-color: #cfa17e;">
        <h2 class="mb-4" style="color: #65310e; font-weight:700;">Add Lost / Found Item</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">Item Title</label>
                <input class="form-control" name="title" placeholder="e.g., Car Keys, Blue Backpack" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">Description</label>
                <textarea class="form-control" name="description" rows="3" placeholder="Where/when was it seen?" required></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold small text-muted">Status</label>
                    <select class="form-control" name="status">
                        <option value="Lost">Lost</option>
                        <option value="Found">Found</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold small text-muted">Contact details</label>
                    <input class="form-control" name="contact" placeholder="Phone number" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-muted">Upload Image (Optional)</label>
                <input type="file" class="form-control" name="image" accept="image/*">
            </div>

            <button class="btn text-white w-100 fw-bold" style="background-color: #65310e;">Submit</button>
        </form>
    </div>
</div>

</body>
</html>

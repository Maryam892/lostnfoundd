<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"><div class="container mt-5" style="max-width: 600px;"><div class="card p-4 shadow-lg border-0">
    <h2 class="h4 mb-4" style="color: #65310e; font-weight: 700;">Edit Posting Details</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label text-muted small fw-bold">Title</label>
            <input class="form-control" name="title" value="{{ item.title }}" required></div>
        <div class="mb-3"><label class="form-label text-muted small fw-bold">Description</label>
            <textarea class="form-control" name="description" rows="4" required>{{ item.description }}</textarea></div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label text-muted small fw-bold">Update Status</label>
                <select class="form-select" name="status">
                    <option value="Lost" {% if item.status == 'Lost' %}selected{% endif %}>Lost</option>
                    <option value="Found" {% if item.status == 'Found' %}selected{% endif %}>Found</option>
                    <option value="Claimed" {% if item.status == 'Claimed' %}selected{% endif %}>🎉 Claimed / Resolved</option>
                </select>
            </div>
            <div class="col-md-6 mb-3"><label class="form-label text-muted small fw-bold">Contact</label>
                <input class="form-control" name="contact" value="{{ item.contact }}" required></div>
        </div>
        <div class="mb-4"><label class="form-label text-muted small fw-bold">Change Image (Optional)</label>
            <input type="file" class="form-control" name="image" accept="image/*"></div>
        <button class="btn text-white w-100 py-2" style="background:#65310e;">Save Structural Changes</button>
    </form>
</div></div></body></html>

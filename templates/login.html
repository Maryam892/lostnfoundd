<!DOCTYPE html>
<html>
<head><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light"><div class="container mt-5" style="max-width: 450px;"><div class="card p-4 shadow border-0">
    <h3 class="mb-3" style="color:#65310e;">Login</h3>
    <form method="POST">{% csrf_token %}{{ form.as_p }}<button class="btn w-100 text-white" style="background:#65310e;">Login</button></form>
    <p class="mt-3 small">New user? <a href="{% url 'register' %}">Register here</a></p>
</div></div></body></html>
